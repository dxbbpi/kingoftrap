<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KING OF TRAP</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700&family=Rajdhani:wght@400;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="https://img2.pic.in.th/pic/ChatGPT-Image-Jul-6-2025-03_55_53-PM.png" type="image/x-icon">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Roboto', sans-serif; background: #0a0a0a; color: #eee; overflow-x: hidden; }

    /* LOADER */
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0a0a0a; display: flex; justify-content: center; align-items: center;
      flex-direction: column; z-index: 9999; opacity: 0; pointer-events: none;
      transition: opacity 0.6s ease; overflow: hidden;
    }
    #loader.show { opacity: 1; pointer-events: auto; }
    #loader .loader-ring {
      width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(255,215,0,0.08);
      border-top-color: #d4a843; animation: spin 1s linear infinite; margin-bottom: 30px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader .loader-text {
      font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #665522;
      letter-spacing: 6px; font-weight: 300;
    }
    #loader .loader-bar {
      width: 120px; height: 1px; background: rgba(255,215,0,0.06); margin-top: 20px; position: relative; overflow: hidden;
    }
    #loader .loader-bar::after {
      content: ''; position: absolute; left: -50%; top: 0; width: 50%; height: 100%;
      background: #d4a843; animation: barMove 1.8s ease-in-out infinite;
    }
    @keyframes barMove { 0% { left: -50%; } 100% { left: 100%; } }

    /* LANDING */
    #landing {
      display: flex; flex-direction: column; justify-content: center; align-items: center;
      height: 100vh; text-align: center;
      background: #0a0a0a;
      position: relative; overflow: hidden;
    }
    #landing .bg-image {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: url('https://img2.pic.in.th/pic/ChatGPT-Image-Jul-6-2025-03_55_53-PM.png') center/cover no-repeat;
      opacity: 0.06;
      z-index: 0;
    }
    #landing .content {
      position: relative;
      z-index: 2;
      padding: 20px;
    }
    #landing h1 {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 5.5rem;
      color: #d4a843;
      letter-spacing: 8px;
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(-20px);
      animation: fadeUp 1.2s forwards;
      text-shadow: 0 0 60px rgba(212,168,67,0.08);
      text-transform: uppercase;
    }
    #landing .sub {
      font-size: 0.9rem;
      color: #887744;
      letter-spacing: 8px;
      font-weight: 300;
      margin-bottom: 40px;
      opacity: 0;
      animation: fadeUp 1.2s forwards 0.3s;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    #enter-btn {
      padding: 14px 50px;
      font-size: 0.8rem;
      font-weight: 400;
      color: #d4a843;
      border: 1px solid rgba(212,168,67,0.2);
      background: rgba(212,168,67,0.02);
      cursor: pointer;
      transition: all 0.4s ease;
      letter-spacing: 6px;
      opacity: 0;
      animation: fadeUp 1.2s forwards 0.6s;
    }
    #enter-btn:hover {
      background: rgba(212,168,67,0.04);
      border-color: rgba(212,168,67,0.4);
      transform: scale(1.02);
      box-shadow: 0 0 50px rgba(212,168,67,0.03);
    }
    #landing footer {
      position: fixed; bottom: 24px; width: 100%; text-align: center; font-size: 0.6rem; color: #332211; z-index: 100; letter-spacing: 3px;
    }

    /* MEMBERS PAGE */
    #members {
      display: none;
      padding: 30px 30px 140px;
      min-height: 100vh;
      background: #0a0a0a;
      position: relative;
    }

    /* HEADER */
    .members-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      padding: 0 10px 20px 10px;
      border-bottom: 1px solid rgba(212,168,67,0.06);
    }
    .members-header .brand {
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .members-header .brand i {
      font-size: 1.2rem;
      color: #d4a843;
      opacity: 0.4;
    }
    .members-header h1 {
      font-family: 'Rajdhani', sans-serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: #d4a843;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .header-actions {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .member-badge {
      font-size: 0.7rem;
      color: #887744;
      background: rgba(212,168,67,0.04);
      padding: 4px 16px;
      border: 1px solid rgba(212,168,67,0.06);
      letter-spacing: 1px;
    }
    .home-btn {
      background: transparent;
      border: 1px solid rgba(212,168,67,0.08);
      padding: 5px 18px;
      color: #887744;
      cursor: pointer;
      transition: 0.3s;
      font-size: 0.7rem;
      letter-spacing: 1px;
    }
    .home-btn:hover {
      background: rgba(212,168,67,0.04);
      border-color: rgba(212,168,67,0.15);
      color: #d4a843;
    }

    /* SEARCH */
    .search-container {
      max-width: 400px;
      margin: 0 auto 40px;
      position: relative;
    }
    .search-container input {
      width: 100%;
      padding: 13px 50px 13px 24px;
      border: none;
      background: rgba(255,255,255,0.02);
      color: #eee;
      outline: none;
      border: 1px solid rgba(212,168,67,0.08);
      font-size: 0.8rem;
      transition: 0.3s;
      letter-spacing: 0.5px;
      border-radius: 30px;
    }
    .search-container input:focus {
      background: rgba(212,168,67,0.02);
      border-color: rgba(212,168,67,0.15);
    }
    .search-container input::placeholder {
      color: #443322;
      letter-spacing: 1px;
    }
    .search-container .fa-search {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      color: #443322;
      font-size: 0.8rem;
    }
    .search-container .fa-times-circle {
      position: absolute;
      top: 50%;
      right: 20px;
      transform: translateY(-50%);
      color: #443322;
      cursor: pointer;
      display: none;
      font-size: 0.9rem;
    }
    .search-container input:not(:placeholder-shown) ~ .fa-times-circle {
      display: block;
    }
    .search-container input:not(:placeholder-shown) ~ .fa-search {
      display: none;
    }

    /* SECTION TITLE */
    .section-title {
      margin: 40px 0 20px;
      font-family: 'Orbitron', sans-serif;
      font-size: 0.6rem;
      color: #665522;
      letter-spacing: 6px;
      text-align: center;
      font-weight: 400;
      border-top: 1px solid rgba(212,168,67,0.04);
      padding-top: 20px;
    }
    .section-title:first-of-type {
      border-top: none;
      padding-top: 0;
      margin-top: 0;
    }

    /* GRIDS */
    .member-center {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      margin-bottom: 10px;
    }
    .member-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 20px;
      justify-items: center;
    }

    /* CARD */
    .member-card {
      background: rgba(255,255,255,0.015);
      border: 1px solid rgba(212,168,67,0.06);
      padding: 24px 16px 18px;
      text-align: center;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
      width: 100%;
      max-width: 190px;
      opacity: 0;
      transform: translateY(16px) scale(0.97);
      position: relative;
      border-radius: 16px;
    }
    .member-card.show {
      animation: cardIn 0.6s forwards;
    }
    @keyframes cardIn {
      to { opacity: 1; transform: translateY(0) scale(1); }
    }
    .member-card:hover {
      background: rgba(212,168,67,0.03);
      border-color: rgba(212,168,67,0.12);
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    .member-card .avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      overflow: hidden;
      margin: 0 auto 14px;
      background: #111;
      border: 2px solid rgba(212,168,67,0.08);
      transition: 0.4s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    .member-card:hover .avatar {
      border-color: rgba(212,168,67,0.18);
      box-shadow: 0 6px 30px rgba(0,0,0,0.4);
    }
    .member-card .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    .member-card .avatar img.loaded {
      opacity: 1;
    }
    .member-card .skeleton-avatar {
      width: 108px;
      height: 108px;
      border-radius: 50%;
      background: linear-gradient(90deg, #141414 0%, #242424 50%, #141414 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      margin: 0 auto 14px;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .member-card h3 {
      color: #e8dcc8;
      font-size: 0.9rem;
      font-weight: 400;
      margin: 8px 0 2px;
      letter-spacing: 0.5px;
    }
    .member-card .role {
      color: #887744;
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .member-card .fb-link {
      color: #665522;
      font-size: 0.65rem;
      text-decoration: none;
      display: inline-block;
      transition: 0.2s;
      letter-spacing: 0.5px;
      padding: 2px 12px;
      border: 1px solid rgba(212,168,67,0.06);
      border-radius: 20px;
    }
    .member-card .fb-link:hover {
      color: #d4a843;
      border-color: rgba(212,168,67,0.12);
    }
    .member-card .card-index {
      position: absolute;
      top: 12px;
      right: 14px;
      font-size: 0.5rem;
      color: #332211;
      font-weight: 300;
      letter-spacing: 1px;
    }

    /* PAGINATION */
    .pagination {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 40px 0 20px;
      flex-wrap: wrap;
    }
    .page-btn {
      padding: 6px 16px;
      background: transparent;
      border: 1px solid rgba(212,168,67,0.06);
      color: #665522;
      cursor: pointer;
      transition: 0.25s;
      font-size: 0.7rem;
      letter-spacing: 1px;
      border-radius: 20px;
      min-width: 36px;
    }
    .page-btn.active {
      background: rgba(212,168,67,0.06);
      color: #d4a843;
      border-color: rgba(212,168,67,0.15);
    }
    .page-btn:hover:not(.active) {
      background: rgba(212,168,67,0.03);
      border-color: rgba(212,168,67,0.1);
      color: #d4a843;
    }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.92);
      display: none; align-items: center; justify-content: center;
      z-index: 2000; backdrop-filter: blur(8px);
    }
    .modal-overlay.show { display: flex; }
    .modal {
      width: 90%; max-width: 400px;
      background: rgba(14,14,14,0.95);
      border: 1px solid rgba(212,168,67,0.08);
      padding: 32px 26px 30px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 30px 80px rgba(0,0,0,0.8);
    }
    .modal-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 20px;
      border-bottom: 1px solid rgba(212,168,67,0.05);
      padding-bottom: 14px;
    }
    .modal-header strong {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem; color: #d4a843; font-weight: 700; letter-spacing: 2px;
      text-transform: uppercase;
    }
    .close-btn {
      background: transparent; border: none; color: #665522;
      font-size: 1.2rem; cursor: pointer; padding: 0 6px;
      transition: 0.2s;
    }
    .close-btn:hover { color: #d4a843; }
    .modal-body {
      display: flex; flex-direction: column; align-items: center;
      gap: 14px;
    }
    .modal-body .modal-avatar {
      width: 120px; height: 120px; border-radius: 50%;
      overflow: hidden; border: 2px solid rgba(212,168,67,0.08);
      background: #111;
      box-shadow: 0 4px 30px rgba(0,0,0,0.3);
    }
    .modal-body .modal-avatar img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .modal-body .info { width: 100%; }
    .modal-body .info .modal-role {
      color: #887744; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 6px;
    }
    .modal-body .info .modal-fb {
      color: #665522; font-size: 0.8rem; text-decoration: none; transition: 0.2s;
    }
    .modal-body .info .modal-fb:hover { color: #d4a843; }
    .modal-extra {
      margin-top: 8px; color: #332211; font-size: 0.65rem; letter-spacing: 0.5px;
    }

    /* MUSIC PLAYER */
    .music-player {
      position: fixed; bottom: 30px; right: 30px; z-index: 1000;
      background: rgba(10,10,10,0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(212,168,67,0.06);
      padding: 8px 18px;
      display: flex; align-items: center; gap: 8px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      border-radius: 30px;
    }
    .music-player .track-name {
      font-size: 0.6rem; color: #665522; max-width: 90px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: 0.5px;
    }
    .music-player button {
      background: transparent; border: none; color: #665522; cursor: pointer;
      font-size: 0.75rem; width: 26px; height: 26px;
      display: inline-flex; align-items: center; justify-content: center;
      transition: 0.2s;
      border-radius: 50%;
    }
    .music-player button:hover { background: rgba(212,168,67,0.04); color: #d4a843; }
    .music-player .volume-slider {
      width: 44px; height: 2px; -webkit-appearance: none; background: #1a1a1a; border-radius: 2px; outline: none; cursor: pointer;
    }
    .music-player .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 7px; height: 7px; border-radius: 50%; background: #665522; cursor: pointer;
    }

    @media (max-width: 600px) {
      #members { padding: 20px 16px 120px; }
      .members-header h1 { font-size: 1.1rem; }
      .members-header .brand i { display: none; }
      .member-card { max-width: 150px; padding: 18px 12px 14px; }
      .member-card .avatar { width: 84px; height: 84px; }
      .member-card .skeleton-avatar { width: 84px; height: 84px; }
      .music-player { bottom: 16px; right: 16px; padding: 6px 12px; gap: 4px; }
      .music-player .track-name { display: none; }
      .music-player .volume-slider { width: 32px; }
      #landing h1 { font-size: 3.5rem; letter-spacing: 4px; }
      .modal-body .modal-avatar { width: 100px; height: 100px; }
      .search-container input { border-radius: 20px; }
    }
  </style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-ring"></div>
  <div class="loader-text">LOADING</div>
  <div class="loader-bar"></div>
</div>

<!-- LANDING -->
<div id="landing">
  <div class="bg-image"></div>
  <div class="content">
    <h1>KING OF TRAP</h1>
    <div class="sub">— MEMBERS —</div>
    <button id="enter-btn">ENTER</button>
  </div>
  <footer>JUTI STORY · 2025</footer>
</div>

<!-- MEMBERS PAGE -->
<div id="members">
  <div class="members-header">
    <div class="brand">
      <i class="fas fa-crown"></i>
      <h1>KING OF TRAP</h1>
    </div>
    <div class="header-actions">
      <span class="member-badge" id="memberCount">0</span>
      <button id="homeBtn" class="home-btn">HOME</button>
    </div>
  </div>

  <div class="search-container">
    <input type="text" id="searchInput" placeholder="ค้นหาสมาชิก...">
    <i class="fas fa-search"></i>
    <i class="fas fa-times-circle" id="clearSearch"></i>
  </div>

  <div id="ownerSection">
    <div class="section-title">OWNER</div>
    <div class="member-center" id="ownerGrid"></div>
  </div>

  <div id="leadersSection">
    <div class="section-title">LEADERS</div>
    <div class="member-center" id="leadersGrid"></div>
  </div>

  <div id="membersSection">
    <div class="section-title">MEMBERS</div>
    <div class="member-grid" id="membersGrid"></div>
  </div>

  <div class="pagination" id="pagination"></div>
</div>

<!-- MUSIC PLAYER -->
<div class="music-player" id="musicPlayer">
  <button id="prevBtn"><i class="fas fa-step-backward"></i></button>
  <button id="playPauseBtn"><i class="fas fa-play"></i></button>
  <button id="stopBtn"><i class="fas fa-stop"></i></button>
  <button id="nextBtn"><i class="fas fa-step-forward"></i></button>
  <span class="track-name" id="trackName">TRACK</span>
  <input type="range" id="volumeControl" class="volume-slider" min="0" max="1" step="0.01" value="0.5">
  <button id="muteBtn"><i class="fas fa-volume-up"></i></button>
</div>

<!-- MODAL -->
<div id="profileModal" class="modal-overlay" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-header">
      <strong id="modalName">Name</strong>
      <button class="close-btn" id="modalClose"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-avatar"><img id="modalImg" src="" alt="profile"></div>
      <div class="info">
        <div class="modal-role" id="modalRole">Role</div>
        <a class="modal-fb" id="modalFbLink" href="#" target="_blank">Facebook</a>
        <div class="modal-extra" id="modalExtra">profile</div>
      </div>
    </div>
  </div>
</div>

<script>
// ===== MUSIC =====
const playlist = [
  { name: "TRAP1", url: "R1.mp3" },
  { name: "TRAP2", url: "R2.mp3" },
];
let currentTrack = 0;
let bgAudio = new Audio();
bgAudio.loop = false;
let isPlaying = false;
let isMuted = false;
let previousVolume = 0.5;
const playPauseBtn = document.getElementById('playPauseBtn');
const stopBtn = document.getElementById('stopBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const volumeControl = document.getElementById('volumeControl');
const muteBtn = document.getElementById('muteBtn');
const trackNameSpan = document.getElementById('trackName');

function loadTrack(index) {
  if (!playlist.length) return;
  const track = playlist[index % playlist.length];
  const wasPlaying = isPlaying;
  bgAudio.pause();
  bgAudio.src = track.url;
  bgAudio.load();
  trackNameSpan.innerText = track.name;
  if (wasPlaying) bgAudio.play().catch(()=>{});
}
function nextTrack() { if (playlist.length) { currentTrack = (currentTrack + 1) % playlist.length; loadTrack(currentTrack); } }
function prevTrack() { if (playlist.length) { currentTrack = (currentTrack - 1 + playlist.length) % playlist.length; loadTrack(currentTrack); } }
function startMusic() {
  if (!playlist.length) return;
  if (!isPlaying) {
    if (!bgAudio.src) loadTrack(currentTrack);
    bgAudio.play().catch(() => { document.body.addEventListener('click', function once() { bgAudio.play().catch(()=>{}); document.body.removeEventListener('click', once); }, { once: true }); });
    isPlaying = true;
    playPauseBtn.innerHTML = '<i class="fas fa-pause"></i>';
  }
}
function pauseMusic() { if (isPlaying) { bgAudio.pause(); isPlaying = false; playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; } }
function stopMusic() { bgAudio.pause(); bgAudio.currentTime = 0; isPlaying = false; playPauseBtn.innerHTML = '<i class="fas fa-play"></i>'; }
function setVolume(value) { let vol = parseFloat(value); if (isNaN(vol)) vol = 0.5; bgAudio.volume = vol; volumeControl.value = vol; if (vol === 0) { muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>'; isMuted = true; } else { muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>'; isMuted = false; } }
function toggleMute() { if (isMuted) { bgAudio.volume = previousVolume; volumeControl.value = previousVolume; muteBtn.innerHTML = '<i class="fas fa-volume-up"></i>'; isMuted = false; } else { previousVolume = bgAudio.volume; bgAudio.volume = 0; volumeControl.value = 0; muteBtn.innerHTML = '<i class="fas fa-volume-mute"></i>'; isMuted = true; } }
playPauseBtn.addEventListener('click', () => { if (isPlaying) pauseMusic(); else startMusic(); });
stopBtn.addEventListener('click', stopMusic);
prevBtn.addEventListener('click', prevTrack);
nextBtn.addEventListener('click', nextTrack);
volumeControl.addEventListener('input', (e) => setVolume(e.target.value));
muteBtn.addEventListener('click', toggleMute);
bgAudio.addEventListener('ended', () => { if (playlist.length) nextTrack(); });
if (playlist.length) { trackNameSpan.innerText = playlist[0].name; bgAudio.src = playlist[0].url; bgAudio.load(); }

// ===== MEMBERS =====
const landing = document.getElementById('landing');
const membersPage = document.getElementById('members');
const loader = document.getElementById('loader');
const searchInput = document.getElementById('searchInput');
const clearSearch = document.getElementById('clearSearch');
const leadersGrid = document.getElementById('leadersGrid');
const membersGrid = document.getElementById('membersGrid');
const ownerGrid = document.getElementById('ownerGrid');
const pagination = document.getElementById('pagination');
const ownerSection = document.getElementById('ownerSection');
const leadersSection = document.getElementById('leadersSection');
const memberCountEl = document.getElementById('memberCount');
let membersData = [];
let currentPage = 1;

document.getElementById('enter-btn').addEventListener('click', () => {
  startMusic();
  loader.classList.add('show');
  setTimeout(() => {
    loader.classList.remove('show');
    setTimeout(() => {
      landing.style.display = 'none';
      membersPage.style.display = 'block';
      window.scrollTo(0,0);
      renderPage();
    }, 500);
  }, 3000);
});

document.getElementById('homeBtn').addEventListener('click', () => {
  membersPage.style.display = 'none';
  landing.style.display = 'flex';
  searchInput.value = '';
  currentPage = 1;
  window.scrollTo(0,0);
  renderPage();
});

clearSearch.addEventListener('click', () => { searchInput.value = ''; currentPage = 1; renderPage(); });
searchInput.addEventListener('input', () => { currentPage = 1; renderPage(); });

fetch('members.json')
  .then(res => res.json())
  .then(data => { membersData = data; renderPage(); })
  .catch(() => { membersData = []; renderPage(); });

function renderPage() {
  if (!membersData.length) { memberCountEl.innerHTML = '0'; return; }
  const searchVal = searchInput.value.toLowerCase().trim();
  
  // ค้นหาในทุกกลุ่ม (Owner, Leaders, Members)
  let allFiltered = membersData.filter(m => m.name.toLowerCase().includes(searchVal));
  
  // แยกตาม role
  let owners = allFiltered.filter(m => m.role.toLowerCase() === 'owner');
  let leaders = allFiltered.filter(m => m.role.toLowerCase().includes('leader') && m.role.toLowerCase() !== 'owner');
  let membersOnly = allFiltered.filter(m => !m.role.toLowerCase().includes('leader') && m.role.toLowerCase() !== 'owner');

  // ถ้าไม่มีการค้นหา ให้แสดงทั้งหมด
  if (!searchVal) {
    owners = membersData.filter(m => m.role.toLowerCase() === 'owner');
    leaders = membersData.filter(m => m.role.toLowerCase().includes('leader') && m.role.toLowerCase() !== 'owner');
    membersOnly = membersData.filter(m => !m.role.toLowerCase().includes('leader') && m.role.toLowerCase() !== 'owner');
  }

  memberCountEl.innerHTML = membersData.length;

  let itemsPerPage = (currentPage === 1) ? 11 : 33;

  if (currentPage === 1) {
    ownerSection.style.display = 'block';
    leadersSection.style.display = 'block';
    ownerGrid.innerHTML = '';
    owners.forEach((m, i) => setTimeout(() => { const card = createCard(m, i); card.classList.add('show'); ownerGrid.appendChild(card); }, i * 60));
    leadersGrid.innerHTML = '';
    leaders.forEach((m, i) => setTimeout(() => { const card = createCard(m, i); card.classList.add('show'); leadersGrid.appendChild(card); }, i * 60));
  } else {
    ownerSection.style.display = 'none';
    leadersSection.style.display = 'none';
  }

  membersGrid.innerHTML = '';
  let startIdx = (currentPage === 1) ? 0 : 11 + (currentPage - 2) * 33;
  let endIdx = startIdx + itemsPerPage;
  const paginatedMembers = membersOnly.slice(startIdx, endIdx);
  paginatedMembers.forEach((m, i) => setTimeout(() => { const card = createCard(m, i); card.classList.add('show'); membersGrid.appendChild(card); }, i * 50));

  pagination.innerHTML = '';
  const totalPages = Math.max(1, Math.ceil((membersOnly.length - 11) / 33) + 1);
  for (let i = 1; i <= totalPages; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
    btn.innerText = i;
    btn.addEventListener('click', () => { currentPage = i; renderPage(); });
    pagination.appendChild(btn);
  }
}

function createCard(m, idx) {
  const card = document.createElement('div');
  card.className = 'member-card';
  card.innerHTML = `
    <div class="avatar" data-loaded="false">
      <img src="${m.img}" alt="${m.name}" loading="lazy">
    </div>
    <h3>${m.name}</h3>
    <div class="role">${m.role}</div>
    <a href="${m.facebook}" target="_blank" class="fb-link">facebook</a>
    <div class="card-index">#${idx+1}</div>
  `;
  const avatar = card.querySelector('.avatar');
  const img = avatar.querySelector('img');
  img.addEventListener('load', () => {
    avatar.innerHTML = '';
    avatar.appendChild(img);
    img.classList.add('loaded');
    avatar.dataset.loaded = 'true';
  });
  img.addEventListener('error', () => {
    avatar.innerHTML = '<i class="fas fa-user" style="font-size:30px;color:#332211;line-height:108px;"></i>';
    avatar.style.background = '#0e0e0e';
  });
  card.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    openProfileModal(m);
  });
  return card;
}

// modal
const profileModal = document.getElementById('profileModal');
const modalName = document.getElementById('modalName');
const modalImg = document.getElementById('modalImg');
const modalRole = document.getElementById('modalRole');
const modalFbLink = document.getElementById('modalFbLink');
const modalExtra = document.getElementById('modalExtra');
const modalClose = document.getElementById('modalClose');
function openProfileModal(m) {
  modalName.innerText = m.name;
  modalRole.innerText = m.role;
  modalFbLink.href = m.facebook || '#';
  modalImg.src = m.img || '';
  modalExtra.innerText = `profile · ${m.name}`;
  profileModal.classList.add('show');
  profileModal.setAttribute('aria-hidden', 'false');
}
function closeProfileModal() {
  profileModal.classList.remove('show');
  profileModal.setAttribute('aria-hidden', 'true');
}
modalClose.addEventListener('click', closeProfileModal);
profileModal.addEventListener('click', e => { if (e.target === profileModal) closeProfileModal(); });

window.addEventListener('resize', () => {});

// security
document.onkeydown = function(e) {
  if (e.keyCode == 123) { window.close(); return false; }
  if (e.ctrlKey && e.shiftKey && (e.keyCode == 'I'.charCodeAt(0) || e.keyCode == 'C'.charCodeAt(0) || e.keyCode == 'J'.charCodeAt(0))) { window.close(); return false; }
  if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) { window.close(); return false; }
};
document.addEventListener('contextmenu', function(e) { e.preventDefault(); window.close(); }, false);
setInterval(function() {
  if (window.devtoolsOpen) { window.close(); }
  const threshold = 160;
  if (window.outerWidth - window.innerWidth > threshold || window.outerHeight - window.innerHeight > threshold) { window.close(); }
}, 1000);
</script>
